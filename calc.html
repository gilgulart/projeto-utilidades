<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/index.css">
    <title>Document</title>
</head>
<body>
    <header>
        <p>Calculadora</p>
    </header>
     <nav class="navbar">
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#">Cronometro</a></li>
        <li><a href="#">Relógio</a></li>
        <li><a href="#">Lista de tarefas</a></li>
      </ul>
    </nav>

  <div class="container">
      <main>

        <div class="calculator">
          <div class="output">
            <span class="result"></span>
          </div>
          <div class="buttons">
            <button class="btn-number">1</button>
            <button class="btn-number">2</button>
            <button class="btn-number">3</button>
            <button class="sum">+</button>
            <button class="btn-number">4</button>
            <button class="btn-number">5</button>
            <button class="btn-number">6</button>
            <button class="substraction">-</button>
            <button class="btn-number">7</button>
            <button class="btn-number">8</button>
            <button class="btn-number">9</button>
            <button class="multiply">*</button>
            <button class="btn-clear">C</button>
            <button class="btn-number">0</button>
            <button class="btn-equal">=</button>
            <button class="divide">/</button>
          </div>
        </div>
      </main>
    </div>

    <footer class="footer">
        <div class="links-footer">
       
            
            <a href="https://github.com/gilgulart" target="_blank" rel="noopener noreferrer">GitHub</a>
            <a href="https://www.linkedin.com/in/gilberto-gulart-ab4a36249/" target="_blank" rel="noopener noreferrer">LinkedIn</a>
            <a href="https://www.instagram.com/gilgulart" target="_blank" rel="noopener noreferrer">Instagram</a>
        </div>
        <div class="signature" >
            <p>Ferramentas simples para o dia a dia</p>
            <p><small>© 2026 Gilberto Daniel</small></p>
        </div>
    </footer>

    <script src="js/calculadora.js"></script>
</body>
</html>
